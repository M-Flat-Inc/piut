name: Publish to npm

on:
  push:
    tags: ['v*']
  repository_dispatch:
    types: [publish-cli]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Verify version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          CLI_VERSION=$(grep -oP "const VERSION = '\K[^']*" src/cli.ts || grep -oP "\.version\('\K[^']*" src/cli.ts || echo "")
          if [ -z "$CLI_VERSION" ] || [ "$PKG_VERSION" != "$CLI_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) != cli.ts version ($CLI_VERSION)"
            exit 1
          fi
          echo "Version: $PKG_VERSION"

      - run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
